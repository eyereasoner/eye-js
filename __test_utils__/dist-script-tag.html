<!DOCTYPE html>
<html>
  <body>
    <div id="result"></div>
    <div id="error"></div>
  </body>
  <!-- Consume the published bundle exactly like the GitHub Pages instructions
       in the README: a script tag pointing at latest/index.js -->
  <script src="/latest/index.js"></script>
  <script>
    const data = `@prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#>.
@prefix : <http://example.org/socrates#>.

:Socrates a :Human.
:Human rdfs:subClassOf :Mortal.

{?A rdfs:subClassOf ?B. ?S a ?A} => {?S a ?B}.`;

    eyereasoner
      .n3reasoner(data, undefined, { output: 'derivations' })
      .then((result) => {
        document.getElementById('result').textContent = result;
      })
      .catch((error) => {
        document.getElementById('error').textContent = String(error);
      });
  </script>
</html>
